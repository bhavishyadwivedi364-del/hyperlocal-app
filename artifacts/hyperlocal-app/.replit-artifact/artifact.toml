kind = "web"
previewPath = "/"
title = "HyperLocal - India Super App"
version = "1.0.0"
id = "artifacts/hyperlocal-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24042

[services.development]
run = "pnpm --filter @workspace/hyperlocal-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hyperlocal-app", "run", "build" ]
publicDir = "artifacts/hyperlocal-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24042"
BASE_PATH = "/"
